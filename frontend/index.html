<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a25;
    --bg-card-hover: #22222f;
    --border: #2a2a3a;
    --border-active: #4a4a6a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555570;
    --accent-blue: #4a9eff;
    --accent-green: #4aff9e;
    --accent-orange: #ff9e4a;
    --accent-red: #ff4a6a;
    --accent-purple: #9e4aff;
    --user-color: #4a9eff;
    --other-color: #ff9e4a;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #app {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    height: 100%;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--accent-blue);
  }
  .logo span { color: var(--text-muted); }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
  .status-dot.calibrating { background: var(--accent-orange); animation: pulse 0.8s infinite; }
  .status-dot.error { background: var(--accent-red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .btn {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    padding: 6px 14px; border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .btn:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--border-active); }
  .btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .btn.danger { border-color: var(--accent-red); color: var(--accent-red); }
  .btn.danger:hover { background: var(--accent-red); color: #fff; }

  select.domain-select {
    font-family: var(--font-mono);
    font-size: 11px; padding: 6px 10px;
    border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-primary);
    cursor: pointer; outline: none; text-transform: uppercase;
  }
  select.domain-select:focus { border-color: var(--accent-blue); }

  .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* Transcript Panel */
  .transcript-panel {
    width: 45%; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
  }

  .panel-header {
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  .transcript-scroll {
    flex: 1; overflow-y: scroll; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 6px;
    scrollbar-width: auto; scrollbar-color: #555570 #1a1a25;
  }
  .transcript-scroll::-webkit-scrollbar { width: 14px; }
  .transcript-scroll::-webkit-scrollbar-track { background: #1a1a25; }
  .transcript-scroll::-webkit-scrollbar-thumb { background: #555570; border-radius: 7px; border: 3px solid #1a1a25; min-height: 50px; }
  .transcript-scroll::-webkit-scrollbar-thumb:hover { background: #8888a0; }

  .transcript-entry { display: flex; gap: 10px; font-size: 13px; line-height: 1.5; padding: 4px 0; }
  .transcript-entry .speaker-tag {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    min-width: 50px; padding-top: 2px; flex-shrink: 0;
  }
  .transcript-entry .speaker-tag.user { color: var(--user-color); }
  .transcript-entry .speaker-tag.other { color: var(--other-color); }
  .transcript-entry .speaker-tag.unknown { color: var(--text-muted); }
  .transcript-entry .text { color: var(--text-primary); opacity: 0.9; }
  .transcript-entry.interim .text { color: var(--text-secondary); font-style: italic; }

  /* Talking Points Panel */
  .talking-points-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  .talking-points-scroll {
    flex: 1; overflow-y: scroll; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: auto; scrollbar-color: #4a9eff #1a1a25;
  }
  .talking-points-scroll::-webkit-scrollbar { width: 14px; }
  .talking-points-scroll::-webkit-scrollbar-track { background: #1a1a25; }
  .talking-points-scroll::-webkit-scrollbar-thumb { background: #4a9eff; border-radius: 7px; border: 3px solid #1a1a25; min-height: 50px; }
  .talking-points-scroll::-webkit-scrollbar-thumb:hover { background: #6ab4ff; }

  .tp-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-left: 3px solid var(--accent-blue);
    border-radius: 4px; padding: 14px 16px;
    font-size: 14px; line-height: 1.6;
    animation: slideIn 0.3s ease-out; position: relative;
  }
  .tp-card.streaming { border-left-color: var(--accent-purple); }
  .tp-card .tp-time {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
    position: absolute; top: 8px; right: 12px;
  }
  .tp-card .tp-content { white-space: pre-wrap; }
  .tp-card .tp-content strong { color: var(--accent-green); font-weight: 600; }

  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .thinking-indicator {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    font-family: var(--font-mono); font-size: 11px; color: var(--accent-blue);
    animation: thinkPulse 1.5s infinite;
  }
  @keyframes thinkPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .thinking-dots span { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--accent-blue); animation:dotBounce 1.2s infinite; }
  .thinking-dots span:nth-child(2){animation-delay:0.2s} .thinking-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dotBounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

  /* Overlays */
  .setup-overlay, .calibration-overlay, .summary-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(12px);
  }

  .setup-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; padding: 36px 40px; max-width: 480px; width: 90%;
  }
  .setup-card h2 { font-family: var(--font-mono); font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--accent-blue); }
  .setup-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

  .setup-field { margin-bottom: 18px; }
  .setup-field label { display: block; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
  .setup-field select, .setup-field input {
    width: 100%; padding: 10px 12px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-primary);
    font-family: var(--font-sans); font-size: 14px; outline: none;
  }
  .setup-field select:focus, .setup-field input:focus { border-color: var(--accent-blue); }

  .setup-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; }
  .setup-actions .btn { padding: 10px 24px; font-size: 12px; }

  .calibration-card { text-align: center; padding: 48px; }
  .calibration-card h2 { font-family: var(--font-mono); font-size: 20px; margin-bottom: 12px; color: var(--accent-orange); }
  .calibration-card p { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

  .mic-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 3px solid var(--accent-orange);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px; animation: micPulse 1s infinite;
  }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,158,74,0.3)} 50%{box-shadow:0 0 0 20px rgba(255,158,74,0)} }
  .mic-ring svg { width: 40px; height: 40px; fill: var(--accent-orange); }

  .calibration-timer { font-family: var(--font-mono); font-size: 48px; font-weight: 300; margin-bottom: 16px; }

  .summary-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px 32px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .summary-card h2 { font-family: var(--font-mono); font-size: 16px; color: var(--accent-green); margin-bottom: 16px; }
  .summary-card .summary-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .summary-card .close-btn { margin-top: 20px; }

  .context-bar {
    padding: 8px 16px; font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted); background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .context-bar .hotkey { padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 10px; background: var(--bg-card); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 12px; }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  .error-toast {
    position: fixed; top: 20px; right: 20px; z-index: 200;
    background: #2a1015; border: 1px solid var(--accent-red); border-radius: 6px;
    padding: 12px 16px; font-family: var(--font-mono); font-size: 12px;
    color: var(--accent-red); max-width: 400px;
    animation: slideIn 0.3s ease-out;
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WS_HOST = window.location.hostname || '127.0.0.1';
const WS_PORT = window.location.port || '8765';
const TARGET_SAMPLE_RATE = 16000;

function generateSessionId() {
  return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

/**
 * Resample Float32Array from sourceSampleRate to targetSampleRate.
 * Linear interpolation — good enough for speech at these rates.
 */
function resampleAudio(float32Array, sourceSampleRate, targetSampleRate) {
  if (sourceSampleRate === targetSampleRate) {
    return float32Array;
  }
  const ratio = sourceSampleRate / targetSampleRate;
  const newLength = Math.round(float32Array.length / ratio);
  const result = new Float32Array(newLength);
  for (let i = 0; i < newLength; i++) {
    const srcIndex = i * ratio;
    const low = Math.floor(srcIndex);
    const high = Math.min(low + 1, float32Array.length - 1);
    const frac = srcIndex - low;
    result[i] = float32Array[low] * (1 - frac) + float32Array[high] * frac;
  }
  return result;
}

/** Convert Float32 [-1,1] to Int16 PCM bytes */
function float32ToInt16(float32Array) {
  const int16 = new Int16Array(float32Array.length);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return int16;
}


/** Simple markdown to HTML — handles **bold**, *italic*, `code`, and bullet lines */
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(74,158,255,0.15);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px">$1</code>')
    .replace(/^[-•] (.+)$/gm, '<div style="padding-left:12px">• $1</div>');
  return html;
}

function App() {
  const [phase, setPhase] = useState('setup');
  const [domain, setDomain] = useState('general');
  const [meetingContext, setMeetingContext] = useState('');
  const [transcripts, setTranscripts] = useState([]);
  const [talkingPoints, setTalkingPoints] = useState([]);
  const [currentStream, setCurrentStream] = useState('');
  const [isThinking, setIsThinking] = useState(false);
  const [status, setStatus] = useState('disconnected');
  const [summaryText, setSummaryText] = useState('');
  const [calibrationCount, setCalibrationCount] = useState(5);
  const [sessionId] = useState(generateSessionId);
  const [interimText, setInterimText] = useState({ speaker: '', text: '' });
  const [errorMsg, setErrorMsg] = useState('');

  const audioWsRef = useRef(null);
  const uiWsRef = useRef(null);
  const audioContextRef = useRef(null);
  const processorRef = useRef(null);
  const streamRef = useRef(null);
  const transcriptEndRef = useRef(null);
  const tpEndRef = useRef(null);

  // Auto-scroll
  useEffect(() => {
    transcriptEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [transcripts, interimText]);

  useEffect(() => {
    tpEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [talkingPoints, currentStream]);

  // Clear errors after 8s
  useEffect(() => {
    if (errorMsg) {
      const t = setTimeout(() => setErrorMsg(''), 8000);
      return () => clearTimeout(t);
    }
  }, [errorMsg]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (phase !== 'live') return;
      if (e.ctrlKey && e.code === 'Space') { e.preventDefault(); sendUiCommand('force_trigger'); }
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); requestSummary(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [phase]);

  // ─── UI WebSocket ───
  const connectUiWs = useCallback(() => {
    return new Promise((resolve, reject) => {
      const url = `ws://${WS_HOST}:${WS_PORT}/ws/ui/${sessionId}`;
      console.log('Connecting UI WS:', url);
      const ws = new WebSocket(url);

      ws.onopen = () => {
        console.log('✓ UI WebSocket connected');
        setStatus('connected');
        resolve(ws);
      };

      ws.onerror = (err) => {
        console.error('UI WS error:', err);
        setErrorMsg('Cannot connect to backend. Is the server running?');
        reject(err);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        // console.log('UI msg:', msg.type, msg);

        switch (msg.type) {
          case 'transcript':
            if (msg.is_final) {
              setTranscripts(prev => [...prev, {
                speaker: msg.speaker,
                text: msg.text,
                time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}),
              }]);
              setInterimText({ speaker: '', text: '' });
            } else {
              setInterimText({ speaker: msg.speaker, text: msg.text });
            }
            break;
          case 'thinking':
            setIsThinking(true);
            setCurrentStream('');
            break;
          case 'talking_point_chunk':
            setIsThinking(false);
            setCurrentStream(prev => prev + msg.text);
            break;
          case 'talking_points':
            setIsThinking(false);
            setCurrentStream('');
            setTalkingPoints(prev => [...prev, {
              text: msg.text,
              time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
            }]);
            break;
          case 'calibration':
            if (msg.state === 'complete') {
              console.log('✓ Calibration complete');
              setPhase('live');
              setStatus('active');
            } else if (msg.state === 'failed') {
              console.warn('Calibration failed, proceeding with heuristic');
              setPhase('live');
              setStatus('active');
            }
            break;
          case 'summary':
            setSummaryText(msg.text);
            setPhase('summary');
            break;
          case 'error':
            console.error('Server error:', msg.message);
            setErrorMsg(msg.message);
            break;
          case 'status':
            console.log('Status:', msg.message);
            break;
        }
      };

      ws.onclose = () => {
        console.log('UI WS closed');
        setStatus('disconnected');
      };

      uiWsRef.current = ws;
    });
  }, [sessionId]);

  const sendUiCommand = (command, data = {}) => {
    if (uiWsRef.current?.readyState === WebSocket.OPEN) {
      uiWsRef.current.send(JSON.stringify({ command, ...data }));
    }
  };

  // ─── Audio Capture ───
  const startAudioCapture = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        }
      });
      streamRef.current = stream;

      // Let browser use its native sample rate — we'll resample in JS
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioContextRef.current = audioCtx;
      const nativeSampleRate = audioCtx.sampleRate;
      console.log(`AudioContext sample rate: ${nativeSampleRate} (will resample to ${TARGET_SAMPLE_RATE})`);

      const source = audioCtx.createMediaStreamSource(stream);
      const processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processorRef.current = processor;

      // Connect audio WS and wait for it to open
      const audioUrl = `ws://${WS_HOST}:${WS_PORT}/ws/audio/${sessionId}`;
      console.log('Connecting Audio WS:', audioUrl);
      const ws = new WebSocket(audioUrl);
      ws.binaryType = 'arraybuffer';
      audioWsRef.current = ws;

      await new Promise((resolve, reject) => {
        ws.onopen = () => { console.log('✓ Audio WebSocket connected'); resolve(); };
        ws.onerror = (err) => { console.error('Audio WS error:', err); reject(new Error('Audio WebSocket failed')); };
      });
      ws.onerror = (err) => {
        console.error('Audio WS error:', err);
        setErrorMsg('Audio WebSocket failed');
      };
      ws.onclose = () => console.log('Audio WS closed');

      let frameCount = 0;
      processor.onaudioprocess = (e) => {
        if (ws.readyState !== WebSocket.OPEN) return;

        const rawFloat32 = e.inputBuffer.getChannelData(0);

        // Resample from native rate → 16kHz
        const resampled = resampleAudio(rawFloat32, nativeSampleRate, TARGET_SAMPLE_RATE);

        // Convert to Int16 PCM
        const pcm16 = float32ToInt16(resampled);

        ws.send(pcm16.buffer);
        frameCount++;
        if (frameCount === 1) {
          console.log(`✓ First audio frame sent (${rawFloat32.length} → ${resampled.length} samples)`);
        }
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);

    } catch (err) {
      console.error('Mic access error:', err);
      setErrorMsg(`Microphone error: ${err.message}`);
      setStatus('error');
    }
  }, [sessionId]);

  const stopAudio = () => {
    processorRef.current?.disconnect();
    audioContextRef.current?.close();
    streamRef.current?.getTracks().forEach(t => t.stop());
    audioWsRef.current?.close();
  };

  // ─── Start Session ───
  const startSession = async () => {
    try {
      // Connect UI WS first and wait for it
      await connectUiWs();

      // Then start audio (waits for WebSocket to open)
      await startAudioCapture();

      // Configure domain/context
      sendUiCommand('set_domain', { domain });
      if (meetingContext) {
        sendUiCommand('set_context', { context: meetingContext });
      }

      // Start calibration
      setPhase('calibrating');
      sendUiCommand('start_calibration');

      let count = 5;
      setCalibrationCount(count);
      const timer = setInterval(() => {
        count--;
        setCalibrationCount(count);
        if (count <= 0) {
          clearInterval(timer);
          sendUiCommand('stop_calibration');
        }
      }, 1000);
    } catch (err) {
      console.error('Session start failed:', err);
      setErrorMsg('Failed to start session. Check that the server is running.');
    }
  };

  const requestSummary = () => sendUiCommand('generate_summary');
  const endSession = () => {
    setStatus('ending');
    // Request summary while connection is alive
    sendUiCommand('generate_summary');
    // Stop audio after a beat so the summary request gets through
    setTimeout(() => {
      stopAudio();
      uiWsRef.current?.close();
    }, 1000);
  };

  // ─── Render: Setup ───
  if (phase === 'setup') {
    return (
      <div className="setup-overlay">
        <div className="setup-card">
          <h2>// COPILOT</h2>
          <p>Real-time conversation intelligence. Set your domain and optional context, then calibrate your voice.</p>
          <div className="setup-field">
            <label>Domain</label>
            <select value={domain} onChange={e => setDomain(e.target.value)}>
              <option value="general">General</option>
              <option value="sales">Sales</option>
              <option value="legal">Legal Consultation</option>
              <option value="security">Security Assessment</option>
            </select>
          </div>
          <div className="setup-field">
            <label>Meeting Context (optional)</label>
            <input type="text" placeholder="e.g., Q3 pipeline review with Acme Corp"
              value={meetingContext} onChange={e => setMeetingContext(e.target.value)} />
          </div>
          <div className="setup-actions">
            <button className="btn active" onClick={startSession}>Start Session →</button>
          </div>
        </div>
        {errorMsg && <div className="error-toast">{errorMsg}</div>}
      </div>
    );
  }

  // ─── Render: Calibration ───
  if (phase === 'calibrating') {
    return (
      <div className="calibration-overlay">
        <div className="calibration-card">
          <h2>Voice Calibration</h2>
          <p>Speak normally for a few seconds so I can learn your voice.</p>
          <div className="mic-ring">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </div>
          <div className="calibration-timer">{calibrationCount}</div>
          <p style={{fontSize:12,color:'var(--text-muted)'}}>
            Say something like: "Testing, one two three. This is my voice calibration."
          </p>
        </div>
        {errorMsg && <div className="error-toast">{errorMsg}</div>}
      </div>
    );
  }

  // ─── Render: Live UI ───
  const liveUI = (
    <>
      <div className="topbar">
        <div className="topbar-left">
          <div className="logo">COPILOT <span>v1</span></div>
          <div className="status-indicator">
            <div className={`status-dot ${status === 'active' ? 'active' : status === 'ending' ? 'calibrating' : status}`} />
            {status === 'active' ? 'LIVE' : status === 'ending' ? 'ENDING...' : status.toUpperCase()}
          </div>
        </div>
        <div className="topbar-right">
          <select className="domain-select" value={domain} onChange={e => {
            setDomain(e.target.value);
            sendUiCommand('set_domain', { domain: e.target.value });
          }}>
            <option value="general">General</option>
            <option value="sales">Sales</option>
            <option value="legal">Legal</option>
            <option value="security">Security</option>
          </select>
          <button className="btn" onClick={() => sendUiCommand('force_trigger')}>⚡ Trigger</button>
          <button className="btn" onClick={requestSummary}>📋 Summary</button>
          {status === 'ending' || status === 'disconnected' ? (
              <button className="btn active" onClick={() => { setPhase('setup'); setStatus('disconnected'); setTranscripts([]); setTalkingPoints([]); setCurrentStream(''); }}>↻ New Session</button>
            ) : (
              <button className="btn danger" onClick={endSession}>■ End</button>
            )}
        </div>
      </div>

      <div className="main">
        <div className="transcript-panel">
          <div className="panel-header">Live Transcript</div>
          <div className="transcript-scroll">
            {transcripts.length === 0 && !interimText.text ? (
              <div className="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
                <p>Waiting for speech...</p>
              </div>
            ) : (
              <>
                {transcripts.map((t, i) => (
                  <div key={i} className="transcript-entry">
                    <span className={`speaker-tag ${t.speaker}`}>
                      {t.speaker === 'user' ? 'YOU' : t.speaker === 'other' ? 'THEM' : '???'}
                    </span>
                    <span className="text">{t.text}</span>
                  </div>
                ))}
                {interimText.text && (
                  <div className="transcript-entry interim">
                    <span className={`speaker-tag ${interimText.speaker}`}>
                      {interimText.speaker === 'user' ? 'YOU' : interimText.speaker === 'other' ? 'THEM' : '...'}
                    </span>
                    <span className="text">{interimText.text}</span>
                  </div>
                )}
              </>
            )}
            <div ref={transcriptEndRef} />
          </div>
        </div>

        <div className="talking-points-panel">
          <div className="panel-header">
            Live Answers
            <span style={{float:'right',color:'var(--accent-green)'}}>● LISTENING</span>
          </div>
          <div className="talking-points-scroll">
            {talkingPoints.length === 0 && !currentStream && !isThinking ? (
              <div className="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <p>Answers appear automatically when questions are asked</p>
              </div>
            ) : (
              <>
                {talkingPoints.map((tp, i) => (
                  <div key={i} className="tp-card">
                    <span className="tp-time">{tp.time}</span>
                    <div className="tp-content" dangerouslySetInnerHTML={{__html: renderMarkdown(tp.text)}} />
                  </div>
                ))}
                {currentStream && (
                  <div className="tp-card streaming">
                    <div className="tp-content" dangerouslySetInnerHTML={{__html: renderMarkdown(currentStream)}} />
                  </div>
                )}
              </>
            )}
            {isThinking && (
              <div className="thinking-indicator">
                <div className="thinking-dots"><span></span><span></span><span></span></div>
                Finding answer...
              </div>
            )}
            <div ref={tpEndRef} />
          </div>
        </div>
      </div>

      <div className="context-bar">
        <span><span className="hotkey">Ctrl+Space</span> Force trigger</span>
        <span><span className="hotkey">Ctrl+S</span> Summary</span>
        <span style={{marginLeft:'auto'}}>{meetingContext && `📌 ${meetingContext}`}</span>
        <span>{transcripts.length} utterances</span>
      </div>

      {errorMsg && <div className="error-toast">{errorMsg}</div>}
    </>
  );

  // ─── Render: Summary ───
  if (phase === 'summary') {
    return (
      <>
        {liveUI}
        <div className="summary-overlay">
          <div className="summary-card">
            <h2>// POST-CALL SUMMARY</h2>
            <div className="summary-text" dangerouslySetInnerHTML={{__html: renderMarkdown(summaryText || 'Generating summary...')}} />
            <button className="btn close-btn" onClick={() => { setPhase('setup'); setStatus('disconnected'); setTranscripts([]); setTalkingPoints([]); setCurrentStream(''); }}>New Session</button>
          </div>
        </div>
      </>
    );
  }

  return liveUI;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
